<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Blog preview card</title>

  <link rel="stylesheet" href="./style.css">

</head>
<body>
  <article class="card">
    <img src="./assets/images/illustration-article.svg" alt="Course cover image" class="card-image-cover">
    <div class="card-content">
      <strong class="card-tag">Learning</strong>
      <p class="card-time">Published <time datetime="2023-12-21">21 Dec 2023</time></p>
      <h2 class="card-title">
        <a href="#">HTML & CSS foundations</a>
      </h2>
      <p class="card-description">These languages are the backbone of every website, defining structure, content, and presentation.</p>
    </div>
    
    <footer class="card-author">
      <img src="./assets/images/image-avatar.webp" alt="Author avatar image" class="card-image-author">
      <span class="card-author-name">Greg Hooper</span>
    </footer>
  </article>
</body>
</html>
